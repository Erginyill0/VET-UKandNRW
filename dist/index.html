 and Berufskolleg give strong ways into university or apprenticeships."],cons:["Choosing a secondary school after grade 4 can feel too early.","Different finishing times can make hobbies and buses stressful.","Written tests and grading pressure can feel heavy."]},{place:"UK schools",short:"Clear year groups, uniforms and big exam stages.",pros:["Uniforms can make mornings simple and reduce fashion pressure.","Houses, clubs and assemblies can create a strong school identity.","GCSEs and A-levels give clear goals and subject choices."],cons:["Uniform rules can feel strict and not very personal.","Long school days, detentions and many rules can be annoying.","GCSE and A-level exam pressure is very high."]}],c0=[{name:"Tom Blake",place:"NRW student",stars:"4/5",text:"I like that my school is near my house and I can ride my bike there. In NRW, many students know people from the same town, so school feels connected to normal life. The problem is that tests come really often, so sometimes the week feels full before it starts. I would like more project work because then school feels less like only grades."},{name:"Lucy Green",place:"UK student",stars:"3.5/5",text:"The clubs after school are cool and the house system makes competitions fun. I think uniforms make everybody look equal, but sometimes the rules are too strict. I do not love that one wrong shoe can become a whole discussion. Still, the school community feels strong because everyone has the same colours and events."},{name:"Ben Taylor",place:"NRW student",stars:"3/5",text:"I think choosing a school type in grade 4 is too early. Some students get better later, so it can feel unfair when people already decide so much. But I like that there are different paths, because not everybody wants the same future. For me, Gesamtschule sounds good because it keeps more options open."},{name:"Emma Wilson",place:"UK student",stars:"4/5",text:"Our school day is long, but the structure helps me. I know exactly when lessons, lunch and clubs happen, and that makes planning easier. The hardest part is thinking about GCSEs, because everyone talks about grades all the time. I like choosing subjects, but I also feel pressure because the choices seem important for my future."},{name:"Jack Miller",place:"UK student",stars:"3/5",text:"I like that teachers in my school push us to speak and present in front of the class. That is useful because it makes students more confident. But sometimes the discipline system feels too much, especially when small mistakes become detentions. In my opinion, UK schools are good for structure, but they could give students more freedom."},{name:"Sophie Brown",place:"NRW student",stars:"4/5",text:"What I like about NRW is that many schools finish earlier than in the UK. That gives time for sports, music or just meeting friends in the afternoon. The negative side is that homework can move the stress from school to home. I think school would be better if homework was shorter but more useful."},{name:"Oliver Smith",place:"UK student",stars:"4.5/5",text:"My favourite thing is that there are many clubs, like football, drama and debate. This makes school more than only lessons. The uniform is not my favourite, but it saves time in the morning and nobody needs expensive clothes. For me, the UK system feels strict, but also very organised."},{name:"Mia Johnson",place:"NRW student",stars:"3.5/5",text:"I like that students in NRW can later choose vocational training or Abitur. That is good because practical jobs are respected too. But the system can be confusing because there are many school names and different paths. I think the best part is that students do not all have to do the same thing."}],f0=["Students learn core subjects like English, maths, science and history.","Both systems use exams and grades to decide the next step.","Schools try to prepare students for university, jobs or apprenticeships."],s0=["NRW separates pupils into different secondary school types earlier, while UK pupils often stay in broader secondary schools before choosing GCSE subjects.","NRW schools usually have no uniform, while many UK schools use uniforms and strict dress codes.","The main qualifications have different names: Abitur or vocational certificates in NRW, GCSEs and A-levels in the UK."],o0=[{side:"NRW",name:"Cologne Cathedral",img:df.nrw,alt:"Cologne Cathedral and the Rhine at night",facts:["Location: Cologne","Type: Gothic cathedral","Known for: twin towers and the Shrine of the Three Kings"],history:"Construction started in 1248 and was finally completed in 1880, so the building connects the Middle Ages with modern Germany. It was badly damaged during World War II, restored after the war and became a UNESCO World Heritage Site in 1996."},{side:"NRW",name:"Zollverein Coal Mine",img:"https://images.pexels.com/photos/20768180/pexels-photo-20768180.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=627&w=1200",alt:"Zollverein Coal Mine Industrial Complex in Essen",facts:["Location: Essen","Type: industrial heritage","Known for: Ruhr area coal and steel culture"],history:"Zollverein shows how coal mining shaped the Ruhr area and the working life of many families. After production ended, the place changed into a museum and cultural area and was listed by UNESCO in 2001."},{side:"NRW",name:"Drachenfels and Drachenburg",img:"https://images.pexels.com/photos/14440435/pexels-photo-14440435.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=627&w=1200",alt:"Schloss Drachenburg in Koenigswinter",facts:["Location: Koenigswinter","Type: Rhine hill and castle","Known for: Rhine views and dragon legends"],history:"The old Drachenfels castle was built in the 12th century and became famous through Rhine romantic stories. Schloss Drachenburg was built in the 19th century, and the railway has carried visitors up the hill since 1883."},{side:"UK",name:"Tower of London",img:"https://images.pexels.com/photos/18729270/pexels-photo-18729270.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=627&w=1200",alt:"Tower of London fortress in London",facts:["Location: London","Type: fortress","Known for: Crown Jewels, ravens and prison history"],history:"William the Conqueror started the fortress after 1066 to control London. It later became a palace, prison, mint and home of the Crown Jewels, which makes it a symbol of royal power."},{side:"UK",name:"Stonehenge",img:"https://images.pexels.com/photos/1448136/pexels-photo-1448136.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=627&w=1200",alt:"Stonehenge with a dramatic sky",facts:["Location: Wiltshire","Type: prehistoric stone circle","Known for: solstice alignment and mystery"],history:"Stonehenge was built in several phases between about 3000 and 1520 BCE. Historians still discuss its exact purpose, but it clearly had religious, burial and seasonal meaning."},{side:"UK",name:"Big Ben and Elizabeth Tower",img:"https://images.pexels.com/photos/11567961/pexels-photo-11567961.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=627&w=1200",alt:"Big Ben and Westminster at night",facts:["Location: London","Type: clock tower","Known for: the bell called Big Ben"],history:"The tower was built after the 1834 fire destroyed much of the old Palace of Westminster. The famous bell was cast in 1858, and the clock became one of the strongest images of British Parliament."}],h0=[{title:"NRW cuisine",text:"NRW food mixes Rhineland, Westphalian and Ruhr area traditions. It is often practical, filling and connected to workers, farms, markets and family Sundays."},{title:"UK cuisine",text:"UK food mixes regional British dishes with influences from migration, empire and city life. It can be simple comfort food, but also very multicultural."}],d0=[{name:"Rheinischer Sauerbraten",img:"https://images.pexels.com/photos/6545671/pexels-photo-6545671.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=420&w=700",alt:"Roast meat with potatoes and vegetables, similar to Sauerbraten",history:"A sour roast from the Rhineland. The idea comes from old methods of marinating meat in vinegar and wine so it stayed tender and lasted longer."},{name:"Himmel und Erde",img:"https://images.pexels.com/photos/128641/pexels-photo-128641.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=420&w=700",alt:"Sausage with mashed potatoes, similar to Himmel und Erde",history:"A mix of mashed potatoes, apples and often blood sausage. It has been known since the 18th century, and the name means heaven and earth because apples grow in trees and potatoes grow in the ground."},{name:"Reibekuchen",img:"https://images.pexels.com/photos/7111391/pexels-photo-7111391.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=420&w=700",alt:"Pancakes on a plate, similar to Reibekuchen",history:"Crispy potato pancakes eaten at markets, fairs and at home. They became common when potatoes spread widely in German everyday cooking."},{name:"Currywurst",img:"https://images.pexels.com/photos/37275061/pexels-photo-37275061.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=420&w=700",alt:"German sausage platter, similar to Currywurst style street food",history:"The famous sausage with curry ketchup is linked to post-war Berlin in 1949 and Herta Heuwer. In NRW, especially in the Ruhr area, it became a quick snack for busy city and factory life."},{name:"Westphalian Pumpernickel",img:"https://images.pexels.com/photos/7118921/pexels-photo-7118921.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=420&w=700",alt:"Dark rye bread similar to Westphalian Pumpernickel",history:"A dark rye bread baked very slowly. It belongs strongly to Westphalia because rye grew well there and the bread stayed edible for a long time."}],m0=[{name:"Fish and chips",img:"https://images.pexels.com/photos/10325093/pexels-photo-10325093.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=420&w=700",alt:"Fish and chips on a plate",history:"Fried fish was influenced by Jewish immigrant communities, and chips became popular in the 19th century. Together they became a cheap working-class meal in industrial Britain."},{name:"Full English breakfast",img:"https://images.pexels.com/photos/8480750/pexels-photo-8480750.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=420&w=700",alt:"Full English breakfast with sausage, eggs and beans",history:"The full breakfast grew from older country-house and hotel breakfast traditions. Later it became a strong symbol of British comfort food with eggs, bacon, sausage, beans and toast."},{name:"Sunday roast with Yorkshire pudding",img:"https://images.pexels.com/photos/6163332/pexels-photo-6163332.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=420&w=700",alt:"Roasted meal with pudding, similar to a Sunday roast",history:"Yorkshire pudding began as a batter cooked under roasting meat to catch dripping fat. A recipe for dripping pudding appeared in 1737, before the name Yorkshire pudding became famous."},{name:"Chicken tikka masala",img:"https://images.pexels.com/photos/20446401/pexels-photo-20446401.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=420&w=700",alt:"Chicken tikka masala with rice and naan",history:"This curry shows British South Asian influence after World War II. It became popular because restaurants adapted Indian-style chicken tikka to British tastes with a creamy sauce."},{name:"Shepherd's pie",img:"https://images.pexels.com/photos/17872666/pexels-photo-17872666.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=420&w=700",alt:"Lamb with mashed potatoes, similar to shepherd's pie ingredients",history:"This dish uses minced lamb under mashed potato. It became popular after potatoes became a cheap everyday food and helped families turn leftovers into a new meal."}],r0=[{label:"Similarity",text:"Both NRW and the UK show that history is not only kings and dates. It is also schools, workers, families, food and the buildings people keep using."},{label:"Similarity",text:"Industry shaped both places. The Ruhr area grew through coal and steel, while British industrial cities also changed through factories, railways and working-class culture."},{label:"Difference",text:"NRW history feels more regional: Rhineland cities, Westphalian traditions and Ruhr industry stand next to each other. UK history feels more national because monarchy, Parliament and empire are visible everywhere."},{label:"Difference",text:"NRW landmarks often tell stories of religion and industrial change, while UK landmarks jump from prehistoric Stonehenge to royal castles and Parliament."},{label:"Our opinion",text:"In the end, NRW and the UK are different, but both prove that history is still alive in normal life: in what students learn, what people eat and what tourists visit."}],y0=[{label:"NRW school system, Familienportal NRW",url:"https://www.familienportal.nrw/en/6-10-years/care-education/types-school-nrw"},{label:"UK education system, UK Government PDF",url:"https://assets.publishing.service.gov.uk/government/uploads/system/uploads/attachment_data/file/219167/v01-2012ukes.pdf"},{label:"Cologne Cathedral, UNESCO",url:"https://whc.unesco.org/en/list/292/"},{label:"Zollverein Coal Mine, UNESCO",url:"https://whc.unesco.org/en/list/975/"},{label:"Drachenfels, Drachenfelsbahn",url:"https://www.drachenfelsbahn.de/en/drachenfels"},{label:"Tower of London, Britannica",url:"https://www.britannica.com/topic/Tower-of-London"},{label:"Stonehenge, Britannica",url:"https://www.britannica.com/topic/Stonehenge"},{label:"Big Ben and Elizabeth Tower, UK Parliament",url:"https://www.parliament.uk/about/living-heritage/building/palace/big-ben/building-clock-tower/key-dates-/"},{label:"Currywurst history, German Patent and Trade Mark Office",url:"https://www.dpma.de/english/our_office/publications/background/food-drink/spirit-currywurst/index.html"},{label:"Himmel und Erde, TasteAtlas",url:"https://www.tasteatlas.com/himmel-und-erde"},{label:"Yorkshire pudding notes, Food Timeline",url:"https://www.foodtimeline.org/foodpuddings.html"}],v0=[{label:"Cologne Cathedral photo by Pham Ngoc Anh on Pexels",url:"https://www.pexels.com/photo/cologne-cathedral-at-night-with-the-river-and-bridge-in-the-background-28079669/"},{label
